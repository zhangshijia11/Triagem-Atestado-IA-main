<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职安通 - 员工门户</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/colaborador.css}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fa-solid fa-notes-medical me-2"></i> 职安通
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white d-none d-md-block">
                    <i class="fa-regular fa-circle-user me-1"></i> <span th:text="${session.usuarioLogado}">员工</span>
                </span>
                <a href="/logout" class="btn btn-sm btn-outline-light rounded-pill px-3">
                    <i class="fa-solid fa-right-from-bracket"></i> 退出
                </a>
            </div>
        </div>
    </nav>

    <div class="welcome-section">
        <div class="container">
            <h2 class="fw-bold"><span th:text="${session.usuarioLogado}">员工</span>，你好！</h2>
            <p class="lead mb-0 text-white-50">今天需要办理什么业务？</p>
        </div>
    </div>

    <div class="container mt-4">

        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${sucesso}">消息</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card border-0 shadow-sm p-4 mb-5">
            <h5 class="fw-bold mb-3" style="color: #004080;"><i class="fa-solid fa-clock-history me-2"></i>我的病假条记录</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle mt-2">
                <thead class="table-light">
                    <tr>
                        <th class="text-center">提交日期</th>
                        <th class="text-center">ICD 编码</th>
                        <th class="text-center">请假天数</th>
                        <th class="text-center">审核状态</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="atestado : ${meusAtestados}">
                        <td class="text-center text-nowrap" th:text="${#temporals.format(atestado.dataEnvio, 'yyyy/MM/dd')}">2026/05/25</td>
                        <td class="text-center text-nowrap"><span class="badge bg-secondary" th:text="${atestado.cid}">M54.5</span></td>
                        <td class="text-center text-nowrap" th:text="${atestado.diasAfastamento + ' 天'}">93 天</td>
                        <td class="text-center text-nowrap">
                            <span th:text="${atestado.status?.name() == 'PENDENTE' ? '待审核' : (atestado.status?.name() == 'APROVADO' ? '已通过' : '已拒绝')}"
                                th:class="${atestado.status?.name() == 'PENDENTE' ? 'badge bg-warning text-dark' : (atestado.status?.name() == 'APROVADO' ? 'badge bg-success' : 'badge bg-danger')}">
                                待审核
                            </span>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(meusAtestados)}">
                        <td colspan="4" class="text-center text-muted py-4">
                            您还没有提交任何病假条。
                        </td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row g-4 position-relative z-1">

            <div class="col-12 col-md-4">
                <div class="service-card active-module">
                    <div>
                        <div class="icon-wrapper">
                            <i class="fa-solid fa-file-prescription"></i>
                        </div>
                        <h4 class="fw-bold mb-2">病假条</h4>
                        <p class="text-muted small mb-4">快速安全地提交病假条，AI 自动提取关键信息并送审。</p>
                    </div>
                    <a href="/novo-atestado" class="btn btn-custom w-100">
                        <i class="fa-solid fa-cloud-arrow-up me-2"></i> 上传文件
                    </a>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="service-card active-module">
                    <div>
                        <div class="icon-wrapper">
                            <i class="fa-solid fa-calendar-check"></i>
                        </div>
                        <h4 class="fw-bold mb-2">预约体检 (职业健康体检)</h4>
                        <p class="text-muted small mb-4">预约入职体检、定期体检或离职体检。</p>
                    </div>
                    <a href="/meus-exames" class="btn btn-custom w-100">
                        <i class="fa-solid fa-calendar-plus me-2"></i> 进入模块
                    </a>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="service-card active-module">
                    <div>
                        <div class="icon-wrapper">
                            <i class="fa-solid fa-helmet-safety"></i>
                        </div>
                        <h4 class="fw-bold mb-2">我的劳保用品</h4>
                        <p class="text-muted small mb-4">电子签收劳保用品，申请更换损坏设备。</p>
                    </div>
                    <a href="/meus-equipamentos" class="btn btn-custom w-100">
                        <i class="fa-solid fa-box-open me-2"></i> 进入模块
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
