<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职安通 - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">
            <i class="fa-solid fa-shield-halved me-2"></i> 职安通
        </div>

        <h5 class="text-center mb-4 text-muted fw-bold">系统登录</h5>

        <div th:if="${erro}" class="alert alert-danger text-center py-2" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-1"></i> <span th:text="${erro}">错误</span>
        </div>

        <form th:action="@{/login}" method="POST">

            <div class="mb-3">
                <label for="email" class="form-label fw-bold text-muted small">企业邮箱</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control bg-light" id="email" name="email" placeholder="zhangli@zhian.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="senha" class="form-label fw-bold text-muted small">密码</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" class="form-control bg-light" id="senha" name="senha" placeholder="请输入密码" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">登 录</button>

        </form>
    </div>

</body>
</html>
