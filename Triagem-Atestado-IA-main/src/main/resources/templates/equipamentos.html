<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职安通 - 我的劳保用品</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/equipamentos.css}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-helmet-safety me-2"></i> 职安通</a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white d-none d-md-block">
                    <i class="fa-regular fa-circle-user me-1"></i> <span th:text="${session.usuarioLogado}">员工</span>
                </span>
                <a href="/logout" class="btn btn-sm btn-outline-light rounded-pill px-3">
                    <i class="fa-solid fa-right-from-bracket"></i> 退出
                </a>
            </div>
        </div>
    </nav>

    <div class="welcome-section">
        <div class="container">
            <h2 class="fw-bold"><span th:text="${session.usuarioLogado}">员工</span>，你好！</h2>
            <p class="lead mb-0 text-white-50">我的劳保用品 (劳动防护)</p>
        </div>
    </div>

    <div class="container mt-4">

        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${sucesso}">消息</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-2"></i> <span th:text="${erro}">错误</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- 劳保用品列表 -->
        <div class="card border-0 shadow-sm p-4 mb-5">
            <h5 class="fw-bold mb-3" style="color: #004080;">
                <i class="fa-solid fa-boxes-stacked me-2"></i>我的劳保用品记录
            </h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle mt-2">
                    <thead class="table-light">
                        <tr>
                            <th class="text-center">编号</th>
                            <th class="text-center">用品类型</th>
                            <th class="text-center">规格/型号</th>
                            <th class="text-center">数量</th>
                            <th class="text-center">发放日期</th>
                            <th class="text-center">有效期至</th>
                            <th class="text-center">状态</th>
                            <th class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${lista}">
                            <td class="text-center fw-bold text-muted" th:text="${'#' + item.id}">#1</td>
                            <td class="text-center">
                                <span th:switch="${item.tipo?.name()}">
                                    <span th:case="'CAPACETE'"><i class="fa-solid fa-hard-hat me-1"></i>安全帽</span>
                                    <span th:case="'LUVAS'"><i class="fa-solid fa-mitten me-1"></i>手套</span>
                                    <span th:case="'BOTAS'"><i class="fa-solid fa-shoe-prints me-1"></i>安全靴</span>
                                    <span th:case="'OCULOS'"><i class="fa-solid fa-glasses me-1"></i>护目镜</span>
                                    <span th:case="'PROTETOR_AURICULAR'"><i class="fa-solid fa-ear-listen me-1"></i>护耳器</span>
                                    <span th:case="'MASCARA'"><i class="fa-solid fa-mask-face me-1"></i>口罩</span>
                                    <span th:case="'CINTO_SEGURANCA'"><i class="fa-solid fa-vest me-1"></i>安全带</span>
                                    <span th:case="'UNIFORME'"><i class="fa-solid fa-shirt me-1"></i>工装</span>
                                </span>
                            </td>
                            <td class="text-center" th:text="${item.especificacao}">--</td>
                            <td class="text-center" th:text="${item.quantidade}">1</td>
                            <td class="text-center" th:text="${#temporals.format(item.dataEntrega, 'yyyy/MM/dd')}">--</td>
                            <td class="text-center">
                                <span th:if="${item.dataValidade != null}" th:text="${#temporals.format(item.dataValidade, 'yyyy/MM/dd')}">--</span>
                                <span th:if="${item.dataValidade == null}" class="text-muted">--</span>
                            </td>
                            <td class="text-center">
                                <span th:switch="${item.status?.name()}">
                                    <span th:case="'ENTREGUE'" class="badge bg-info">待签收</span>
                                    <span th:case="'EM_USO'" class="badge bg-success">使用中</span>
                                    <span th:case="'DEVOLVIDO'" class="badge bg-secondary">已归还</span>
                                    <span th:case="'VENCIDO'" class="badge bg-danger">已过期</span>
                                </span>
                            </td>
                            <td class="text-center">
                                <!-- 待签收 → 确认签收 -->
                                <form th:if="${item.status?.name() == 'ENTREGUE'}" th:action="@{/equipamento/confirmar/{id}(id=${item.id})}" method="POST" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-success" title="确认签收">
                                        <i class="fa-solid fa-check me-1"></i>签收
                                    </button>
                                </form>
                                <!-- 使用中 → 申请更换 -->
                                <button th:if="${item.status?.name() == 'EM_USO'}" class="btn btn-sm btn-warning" data-bs-toggle="modal" data-bs-target="#trocaModal" th:attr="data-id=${item.id}">
                                    <i class="fa-solid fa-rotate me-1"></i>更换
                                </button>
                                <span th:if="${item.status?.name() == 'DEVOLVIDO' or item.status?.name() == 'VENCIDO'}" class="text-muted small">--</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(lista)}">
                            <td colspan="8" class="text-center text-muted py-4">
                                您还没有任何劳保用品记录。
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="pb-3">
            <a href="/portal-colaborador" class="btn btn-outline-secondary rounded-pill">
                <i class="fa-solid fa-arrow-left me-2"></i> 返回门户
            </a>
        </div>
    </div>

    <!-- 更换申请 Modal -->
    <div class="modal fade" id="trocaModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header" style="background-color: #004080; color: white;">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-rotate me-2"></i>申请更换</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="trocaForm" method="POST">
                    <div class="modal-body">
                        <label class="form-label fw-bold small">更换原因</label>
                        <textarea name="observacao" class="form-control" rows="3" placeholder="请描述损坏情况或更换原因..." required></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-custom">提交申请</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('trocaModal').addEventListener('show.bs.modal', function(event) {
            var button = event.relatedTarget;
            var id = button.getAttribute('data-id');
            document.getElementById('trocaForm').action = '/equipamento/devolver/' + id;
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
