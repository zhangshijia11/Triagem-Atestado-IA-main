<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职安通 - 体检管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

    

        <nav id="sidebar">
        <div class="sidebar-brand"><i class="fa-solid fa-shield-halved me-2"></i> 职安通</div>
        <div class="nav flex-column mt-4">
            <a href="/portal-empresa/home" class="nav-link"><i class="fa-solid fa-house"></i> 首页</a>
            <a href="/portal-empresa/funcionarios" class="nav-link"><i class="fa-solid fa-users"></i> 员工管理</a>
            <a href="/portal-empresa" class="nav-link"><i class="fa-solid fa-file-medical"></i> 病假条管理</a>
            <a href="/portal-exames" class="nav-link active"><i class="fa-solid fa-stethoscope"></i> 体检管理</a>
            <a href="/portal-equipamentos" class="nav-link"><i class="fa-solid fa-helmet-safety"></i> 劳保管理</a>
            <a href="/portal-empresa/riscos" class="nav-link"><i class="fa-solid fa-chart-line"></i> 职业风险评估</a>
            <div class="mt-auto pb-4"><a href="/logout" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> 退出系统</a></div>
        </div>
    </nav>


    <div id="content">
        <div class="top-bar">
            <div>
                <h2 class="fw-bold mb-0">体检管理 (职业健康体检)</h2>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end">
                    <div class="fw-bold" th:text="${session.usuarioLogado}">企业名称</div>
                    <div class="small text-muted">角色：职业健康安全管理员</div>
                </div>
                <div class="rounded-circle bg-white p-2 shadow-sm">
                    <img src="https://ui-avatars.com/api/?name=职安通&background=004080&color=fff" class="rounded-circle" width="40" alt="Avatar">
                </div>
            </div>
        </div>

        <!-- 录入体检结果表单 -->
        <div class="card kpi-card p-4 mb-4">
            <h5 class="fw-bold mb-3" style="color: #004080;">
                <i class="fa-solid fa-file-medical-alt me-2"></i>录入体检结果
            </h5>
            <form th:action="@{/exame/resultado/0}" method="POST" enctype="multipart/form-data" id="resultadoForm">
                <div class="row g-3">
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">体检编号</label>
                        <input type="number" name="exameIdInput" class="form-control" placeholder="例如：1" id="exameIdInput">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">医生 执业证号</label>
                        <input type="text" name="crmMedico" class="form-control" placeholder="110000000000000" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">体检结果</label>
                        <select name="statusFinal" class="form-select" required>
                            <option value="">-- 请选择 --</option>
                            <option value="APTO">合格 (Apto)</option>
                            <option value="INAPTO">不合格 (Inapto)</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">结果摘要</label>
                        <input type="text" name="resultado" class="form-control" placeholder="体检结果简要说明..." required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">体检报告 <span class="text-muted">(PDF/图片)</span></label>
                        <input type="file" name="arquivo" class="form-control" accept="image/*,.pdf">
                    </div>
                </div>
                <div class="text-end mt-2">
                    <button type="submit" class="btn px-4" style="background-color: #0073e6; color: white; font-weight: 600; border-radius: 8px;">
                        <i class="fa-solid fa-save me-1"></i> 保存结果
                    </button>
                </div>
            </form>
        </div>

        <!-- KPI Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card kpi-card p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="text-muted small fw-bold">体检总数</div>
                            <div class="h3 fw-bold mt-1" th:text="${totalExames}">0</div>
                        </div>
                        <div class="kpi-icon bg-primary-subtle text-primary"><i class="fa-solid fa-stethoscope"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="text-muted small fw-bold">待体检</div>
                            <div class="h3 fw-bold mt-1" th:text="${agendados}">0</div>
                        </div>
                        <div class="kpi-icon bg-warning-subtle text-warning"><i class="fa-solid fa-clock"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="text-muted small fw-bold">合格</div>
                            <div class="h3 fw-bold mt-1" th:text="${aptos}">0</div>
                        </div>
                        <div class="kpi-icon bg-success-subtle text-success"><i class="fa-solid fa-check-circle"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="text-muted small fw-bold">不合格</div>
                            <div class="h3 fw-bold mt-1" th:text="${inaptos}">0</div>
                        </div>
                        <div class="kpi-icon bg-danger-subtle text-danger"><i class="fa-solid fa-xmark-circle"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 体检队列 -->
        <div class="table-container table-responsive">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">体检管理队列</h5>
                <span class="badge bg-danger" th:if="${agendados > 0}" th:text="${agendados + ' 项待体检'}">0 项待体检</span>
            </div>

            <div th:if="${sucessoAction}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm py-2" role="alert">
                <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${sucessoAction}">成功</span>
                <button type="button" class="btn-close mt-1" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${erroAction}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm py-2" role="alert">
                <i class="fa-solid fa-circle-xmark me-2"></i> <span th:text="${erroAction}">错误</span>
                <button type="button" class="btn-close mt-1" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <table class="table table-hover align-middle mt-2">
                <thead class="table-light">
                    <tr>
                        <th class="text-center">编号</th>
                        <th class="text-center">员工</th>
                        <th class="text-center">体检类型</th>
                        <th class="text-center">预约日期</th>
                        <th class="text-center">完成日期</th>
                        <th class="text-center">诊所</th>
                        <th class="text-center">执业证号</th>
                        <th class="text-center">状态</th>
                        <th>结果摘要</th>
                        <th class="text-center">报告</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="exame : ${exames}">
                        <td class="text-muted fw-bold text-nowrap" th:text="${'#' + exame.id}">#1</td>
                        <td class="fw-bold text-nowrap" th:text="${exame.funcionario.nome}">姓名</td>
                        <td class="text-center">
                            <span th:switch="${exame.tipoExame?.name()}">
                                <span th:case="'ADMISSIONAL'" class="badge bg-primary">入职</span>
                                <span th:case="'PERIODICO'" class="badge bg-info">定期</span>
                                <span th:case="'DEMISSIONAL'" class="badge bg-warning">离职</span>
                                <span th:case="'RETORNO_AO_TRABALHO'" class="badge bg-secondary">返岗</span>
                            </span>
                        </td>
                        <td class="text-center" th:text="${#temporals.format(exame.dataAgendamento, 'yyyy/MM/dd')}">2026/01/01</td>
                        <td class="text-center">
                            <span th:if="${exame.dataRealizacao != null}" th:text="${#temporals.format(exame.dataRealizacao, 'yyyy/MM/dd')}">2026/01/01</span>
                            <span th:if="${exame.dataRealizacao == null}" class="text-muted">--</span>
                        </td>
                        <td class="text-center" th:text="${exame.clinica}">诊所</td>
                        <td class="text-center">
                            <span th:if="${exame.crmMedico != null}" class="badge bg-light text-dark border" th:text="${exame.crmMedico}">执业证号</span>
                            <span th:if="${exame.crmMedico == null}" class="text-muted small">--</span>
                        </td>
                        <td class="text-center">
                            <span th:switch="${exame.status?.name()}">
                                <span th:case="'AGENDADO'" class="status-badge bg-pending">已预约</span>
                                <span th:case="'REALIZADO'" class="badge bg-info">已完成</span>
                                <span th:case="'APTO'" class="status-badge bg-approved">合格</span>
                                <span th:case="'INAPTO'" class="status-badge bg-danger-custom">不合格</span>
                            </span>
                        </td>
                        <td>
                            <small th:if="${exame.resultado != null}" th:text="${exame.resultado}" class="text-muted"></small>
                            <span th:if="${exame.resultado == null}" class="text-muted small">--</span>
                        </td>
                        <td class="text-center">
                            <a th:if="${exame.nomeArquivo != null}"
                               th:href="@{/exame/arquivo/{nome}(nome=${exame.nomeArquivo})}"
                               target="_blank" class="btn btn-sm btn-outline-primary" title="查看报告">
                                <i class="fa-solid fa-file-pdf"></i>
                            </a>
                            <span th:if="${exame.nomeArquivo == null}" class="text-muted small">--</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(exames)}">
                        <td colspan="9" class="text-center text-muted py-4">
                            <i class="fa-solid fa-folder-open mb-2" style="font-size: 2rem; opacity: 0.5;"></i><br>
                            暂无体检记录。
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 动态修改表单 action 为选中的体检编号
        document.getElementById('exameIdInput').addEventListener('input', function() {
            const form = document.getElementById('resultadoForm');
            const id = this.value;
            form.action = '/exame/resultado/' + id;
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
