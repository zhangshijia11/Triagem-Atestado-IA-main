<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职安通 - 员工管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .risk-low { color: #22c55e; }
        .risk-mid { color: #f59e0b; }
        .risk-high { color: #ef4444; }
        .employee-row { cursor: pointer; transition: background 0.15s; }
        .employee-row:hover { background: #f0f7ff !important; }
    </style>
</head>
<body>

    

        <nav id="sidebar">
        <div class="sidebar-brand"><i class="fa-solid fa-shield-halved me-2"></i> 职安通</div>
        <div class="nav flex-column mt-4">
            <a href="/portal-empresa/home" class="nav-link"><i class="fa-solid fa-house"></i> 首页</a>
            <a href="/portal-empresa/funcionarios" class="nav-link active"><i class="fa-solid fa-users"></i> 员工管理</a>
            <a href="/portal-empresa" class="nav-link"><i class="fa-solid fa-file-medical"></i> 病假条管理</a>
            <a href="/portal-exames" class="nav-link"><i class="fa-solid fa-stethoscope"></i> 体检管理</a>
            <a href="/portal-equipamentos" class="nav-link"><i class="fa-solid fa-helmet-safety"></i> 劳保管理</a>
            <a href="/portal-empresa/riscos" class="nav-link"><i class="fa-solid fa-chart-line"></i> 职业风险评估</a>
            <div class="mt-auto pb-4"><a href="/logout" class="nav-link text-danger"><i class="fa-solid fa-right-from-bracket"></i> 退出系统</a></div>
        </div>
    </nav>


    <div id="content">
        <div class="top-bar">
            <div>
                <h2 class="fw-bold mb-0">员工管理</h2>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end">
                    <div class="fw-bold" th:text="${session.usuarioLogado}">企业名称</div>
                    <div class="small text-muted">角色：职业健康安全管理员</div>
                </div>
                <div class="rounded-circle bg-white p-2 shadow-sm">
                    <img src="https://ui-avatars.com/api/?name=职安通&background=004080&color=fff" class="rounded-circle" width="40" alt="Avatar">
                </div>
            </div>
        </div>

        <!-- KPI 概览 -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card kpi-card p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="text-muted small fw-bold">员工总数</div>
                            <div class="h3 fw-bold mt-1" th:text="${totalFuncionarios}">0</div>
                        </div>
                        <div class="kpi-icon bg-primary-subtle text-primary"><i class="fa-solid fa-users"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="text-muted small fw-bold">有缺勤记录</div>
                            <div class="h3 fw-bold mt-1" th:text="${comAtestados}">0</div>
                        </div>
                        <div class="kpi-icon bg-warning-subtle text-warning"><i class="fa-solid fa-file-medical"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="text-muted small fw-bold">体检不合格</div>
                            <div class="h3 fw-bold mt-1" th:text="${comExamesInaptos}">0</div>
                        </div>
                        <div class="kpi-icon bg-danger-subtle text-danger"><i class="fa-solid fa-xmark-circle"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="text-muted small fw-bold">劳保过期未更换</div>
                            <div class="h3 fw-bold mt-1" th:text="${comEquipVencidos}">0</div>
                        </div>
                        <div class="kpi-icon bg-danger-subtle text-danger"><i class="fa-solid fa-clock"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 员工列表 -->
        <div class="table-container table-responsive">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">员工名册</h5>
                <span class="badge bg-primary" th:text="${totalFuncionarios + ' 名员工'}">0 名员工</span>
            </div>

            <table class="table table-hover align-middle mt-2">
                <thead class="table-light">
                    <tr>
                        <th>姓名</th>
                        <th>邮箱</th>
                        <th class="text-center">病假条提交</th>
                        <th class="text-center">累计缺勤天数</th>
                        <th class="text-center">体检记录</th>
                        <th class="text-center">劳保用品</th>
                        <th class="text-center">风险状态</th>
                        <th class="text-center">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="f : ${funcionarios}" class="employee-row" th:onclick="|window.location.href='/portal-empresa/funcionarios/${f.usuario.id}'|" style="cursor: pointer;">
                        <td class="fw-bold" th:text="${f.usuario.nome}">姓名</td>
                        <td class="text-muted small" th:text="${f.usuario.email}">email</td>
                        <td class="text-center">
                            <span class="fw-bold" th:text="${f.totalAtestados}">0</span>
                            <span th:if="${f.atestadosPendentes > 0}" class="badge bg-warning text-dark ms-1" th:text="${f.atestadosPendentes + ' 待审'}">0 待审</span>
                        </td>
                        <td class="text-center">
                            <span th:text="${f.diasTotaisAfastamento + ' 天'}" th:class="${f.diasTotaisAfastamento > 30 ? 'text-danger fw-bold' : (f.diasTotaisAfastamento > 15 ? 'text-warning fw-bold' : '')}">0 天</span>
                        </td>
                        <td class="text-center">
                            <span th:text="${f.totalExames}">0</span>
                            <span th:if="${f.examesInaptos > 0}" class="badge bg-danger ms-1" th:text="${f.examesInaptos + ' 不合格'}">0 不合格</span>
                        </td>
                        <td class="text-center">
                            <span th:text="${f.totalEquipamentos}">0</span>
                            <span th:if="${f.equipamentosVencidos > 0}" class="badge bg-danger ms-1" th:text="${f.equipamentosVencidos + ' 过期'}">0 过期</span>
                        </td>
                        <td class="text-center">
                            <span th:if="${f.diasTotaisAfastamento > 30 or f.examesInaptos > 0}"
                                  class="badge bg-danger">高风险</span>
                            <span th:if="${(f.diasTotaisAfastamento > 15 and f.diasTotaisAfastamento <= 30) or f.atestadosPendentes > 0}"
                                  class="badge bg-warning text-dark">需关注</span>
                            <span th:if="${f.diasTotaisAfastamento <= 15 and f.examesInaptos == 0 and f.atestadosPendentes == 0}"
                                  class="badge bg-success">正常</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/portal-empresa/funcionarios/{id}(id=${f.usuario.id})}" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                                <i class="fa-solid fa-eye me-1"></i> 详情
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(funcionarios)}">
                        <td colspan="8" class="text-center text-muted py-5">
                            <i class="fa-solid fa-user-slash mb-2" style="font-size: 2.5rem; opacity: 0.4;"></i><br>
                            暂无员工记录。<br>
                            <small class="text-muted">请先通过数据初始化或手动添加员工账号（FUNCIONARIO 角色）。</small>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
