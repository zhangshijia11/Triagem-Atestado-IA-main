<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职安通 - 我的体检</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/exames.css}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fa-solid fa-stethoscope me-2"></i> 职安通
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white d-none d-md-block">
                    <i class="fa-regular fa-circle-user me-1"></i> <span th:text="${session.usuarioLogado}">员工</span>
                </span>
                <a href="/logout" class="btn btn-sm btn-outline-light rounded-pill px-3">
                    <i class="fa-solid fa-right-from-bracket"></i> 退出
                </a>
            </div>
        </div>
    </nav>

    <div class="welcome-section">
        <div class="container">
            <h2 class="fw-bold"><span th:text="${session.usuarioLogado}">员工</span>，你好！</h2>
            <p class="lead mb-0 text-white-50">体检预约与管理 (职业健康体检)</p>
        </div>
    </div>

    <div class="container mt-4">

        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${sucesso}">消息</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-2"></i> <span th:text="${erro}">错误</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- 预约新体检 -->
        <div class="card border-0 shadow-sm p-4 mb-5">
            <h5 class="fw-bold mb-3" style="color: #004080;">
                <i class="fa-solid fa-calendar-plus me-2"></i>预约体检
            </h5>
            <form th:action="@{/agendar-exame}" method="POST">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">体检类型</label>
                        <select name="tipoExame" class="form-select" required>
                            <option value="">-- 请选择 --</option>
                            <option value="ADMISSIONAL">入职体检</option>
                            <option value="PERIODICO">定期体检</option>
                            <option value="DEMISSIONAL">离职体检</option>
                            <option value="RETORNO_AO_TRABALHO">返岗体检</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">预约日期</label>
                        <input type="date" name="dataAgendamento" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">体检诊所/医院</label>
                        <input type="text" name="clinica" class="form-control" placeholder="例如：北京市职业病防治院" required>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button type="submit" class="btn btn-custom w-100">
                            <i class="fa-solid fa-paper-plane me-2"></i> 提交预约
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- 体检历史 -->
        <div class="card border-0 shadow-sm p-4 mb-5">
            <h5 class="fw-bold mb-3" style="color: #004080;">
                <i class="fa-solid fa-clock-history me-2"></i>我的体检记录
            </h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle mt-2">
                    <thead class="table-light">
                        <tr>
                            <th class="text-center">编号</th>
                            <th class="text-center">体检类型</th>
                            <th class="text-center">预约日期</th>
                            <th class="text-center">完成日期</th>
                            <th class="text-center">诊所</th>
                            <th class="text-center">状态</th>
                            <th class="text-center">报告</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="exame : ${meusExames}">
                            <td class="text-center fw-bold text-muted" th:text="${'#' + exame.id}">#1</td>
                            <td class="text-center">
                                <span th:switch="${exame.tipoExame?.name()}">
                                    <span th:case="'ADMISSIONAL'" class="badge bg-primary">入职</span>
                                    <span th:case="'PERIODICO'" class="badge bg-info">定期</span>
                                    <span th:case="'DEMISSIONAL'" class="badge bg-warning">离职</span>
                                    <span th:case="'RETORNO_AO_TRABALHO'" class="badge bg-secondary">返岗</span>
                                </span>
                            </td>
                            <td class="text-center" th:text="${#temporals.format(exame.dataAgendamento, 'yyyy/MM/dd')}">2026/01/01</td>
                            <td class="text-center">
                                <span th:if="${exame.dataRealizacao != null}" th:text="${#temporals.format(exame.dataRealizacao, 'yyyy/MM/dd')}">2026/01/01</span>
                                <span th:if="${exame.dataRealizacao == null}" class="text-muted">--</span>
                            </td>
                            <td class="text-center" th:text="${exame.clinica}">诊所名称</td>
                            <td class="text-center">
                                <span th:switch="${exame.status?.name()}">
                                    <span th:case="'AGENDADO'" class="badge bg-warning text-dark">已预约</span>
                                    <span th:case="'REALIZADO'" class="badge bg-info">已完成</span>
                                    <span th:case="'APTO'" class="badge bg-success">合格</span>
                                    <span th:case="'INAPTO'" class="badge bg-danger">不合格</span>
                                </span>
                            </td>
                            <td class="text-center">
                                <a th:if="${exame.nomeArquivo != null}"
                                   th:href="@{/exame/arquivo/{nome}(nome=${exame.nomeArquivo})}"
                                   target="_blank" class="btn btn-sm btn-outline-primary" title="查看体检报告">
                                    <i class="fa-solid fa-file-pdf"></i>
                                </a>
                                <span th:if="${exame.nomeArquivo == null}" class="text-muted small">--</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(meusExames)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                您还没有任何体检记录。
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="pb-3">
            <a href="/portal-colaborador" class="btn btn-outline-secondary rounded-pill">
                <i class="fa-solid fa-arrow-left me-2"></i> 返回门户
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
