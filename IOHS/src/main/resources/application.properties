spring.application.name=zhiantong
# Configuração do banco H2
spring.datasource.url=jdbc:h2:mem:zatdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Recriar as tabelas toda vez que rodar (ótimo para testes)
spring.jpa.hibernate.ddl-auto=update

# Habilitar o console do H2 no navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuração de Acesso à DeepSeek API (OpenAI-compatível)
deepseek.api.key=${DEEPSEEK_API_KEY}
deepseek.api.url=https://api.deepseek.com/v1/chat/completions
deepseek.api.model=deepseek-v4-flash

# Aumentando o limite de upload de arquivos (Tamanho por arquivo e tamanho total da requisicao)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
spring.config.import=optional:classpath:env.properties

# Desabilitar cache do Thymeleaf para desenvolvimento
spring.thymeleaf.cache=false